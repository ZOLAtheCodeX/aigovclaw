# AIGovClaw adapter configuration (example).
#
# AIGovClaw is MCP-first: artifacts are routed through Model Context Protocol
# servers rather than destination-specific HTTP clients. This file declares
# (a) which adapters are enabled, and (b) for the MCP router, which artifact
# types map to which MCP tool invocations.
#
# See adapters/README.md for the full design rationale. Summary: MCP servers
# already exist for Notion, Linear, Google Drive, GitHub, Gmail, and others.
# AIGovClaw reuses them via configuration rather than duplicating HTTP clients.
# Credentials live in the MCP server's own config, never here.
#
# Copy this file to config/adapters.yaml and edit. config/adapters.yaml is
# gitignored.
#
# Style: no em-dashes, no emojis, no hedging.

adapters:

  # -------------------------------------------------------------------
  # local-filesystem: source of record. Always on. Writes every artifact
  # to ~/.hermes/memory/aigovclaw/<artifact-type>/<system>/<timestamp>.json|md
  # before any other routing. Disaster recovery baseline.
  # -------------------------------------------------------------------
  local-filesystem:
    enabled: true
    base_path: ~/.hermes/memory/aigovclaw

  # -------------------------------------------------------------------
  # mcp: the router that translates artifact dicts into MCP tool-invocation
  # specifications. The Hermes harness reads those specs and invokes the
  # configured MCP tools. This section does not hold credentials.
  # -------------------------------------------------------------------
  mcp:
    enabled: true
    routes:

      # Risk register rows route to Notion. Replace database_id with the
      # ID of the Notion database you created for risk register entries.
      risk-register-row:
        - mcp_server: notion
          tool_name: notion-create-page
          arguments:
            parent: {database_id: "<your-notion-risk-register-db-id>"}
          property_mapping:
            Title: "description"
            System: "system_name"
            Category: "category"
            Likelihood: "likelihood"
            Impact: "impact"
            Residual: "residual_score"
            Owner: "owner_role"
            Treatment: "treatment"
            Status: "status"

      # Nonconformity records route to Linear as issues in the chosen team.
      nonconformity-record:
        - mcp_server: linear
          tool_name: linear-create-issue
          arguments:
            team: "<your-linear-team-id>"
          property_mapping:
            title: "description"
            state: "status"
            description: "root_cause"
            priority: "severity"

      # Audit-log entries archive to Google Drive as documents, one per entry.
      audit-log-entry:
        - mcp_server: google-drive
          tool_name: google-drive-create-document
          arguments:
            folder_id: "<your-drive-audit-folder-id>"

      # Statement of Applicability rows route to Notion.
      soa-row:
        - mcp_server: notion
          tool_name: notion-create-page
          arguments:
            parent: {database_id: "<your-notion-soa-db-id>"}
          property_mapping:
            Control: "control_id"
            Title: "control_title"
            Status: "status"
            Justification: "justification"

      # AISIA sections route to Notion as a linked set of pages.
      aisia-section:
        - mcp_server: notion
          tool_name: notion-create-page
          arguments:
            parent: {database_id: "<your-notion-aisia-db-id>"}

      # Gap assessment rows route to Notion for dashboarding.
      gap-assessment-row:
        - mcp_server: notion
          tool_name: notion-create-page
          arguments:
            parent: {database_id: "<your-notion-gap-db-id>"}

      # Risk-tier classification records route to Notion so compliance leads
      # can triage which systems require Article 27 FRIA or legal review.
      risk-tier-classification:
        - mcp_server: notion
          tool_name: notion-create-page
          arguments:
            parent: {database_id: "<your-notion-classification-db-id>"}
          property_mapping:
            System: "system_name"
            Tier: "risk_tier"
            LegalReview: "requires_legal_review"

      # Metrics reports (NIST MEASURE 2.x) can double-route: a CSV snapshot
      # to Google Drive, plus a summary row to Notion for leadership.
      metrics-report:
        - mcp_server: google-drive
          tool_name: google-drive-create-document
          arguments:
            folder_id: "<your-drive-metrics-folder-id>"
        - mcp_server: notion
          tool_name: notion-create-page
          arguments:
            parent: {database_id: "<your-notion-metrics-summary-db-id>"}

      # Any artifact type not listed here falls back to local-filesystem only.
      # Add rows as your Notion / Linear / Drive schema evolves.

# -------------------------------------------------------------------
# Global adapter behavior.
# -------------------------------------------------------------------
behavior:
  # Every MCP-routed push emits an ISO 42001 Clause 7.5.3 audit-log entry
  # via the audit-log-generator plugin. Always on for governance integrity.
  emit_distribution_audit_log: true

  # Failed MCP invocations surface to the review queue and do not abort
  # the workflow. Retry policy is organizational policy, not hardcoded.
  resilient_mode: true

  # Action-item classification tag is computed by the router from the
  # artifact's warnings list and attached as a property on every pushed
  # page or record. Tags: action-required-human,
  # completed-autonomously-high-confidence,
  # completed-autonomously-low-confidence.
  attach_action_tag: true
